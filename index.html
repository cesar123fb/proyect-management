<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DesignManager Pro</title>
    
    <!-- TailwindCSS para el diseño -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome para los íconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Firebase (Versión Compat para HTML simple) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    
    <!-- React y ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel para compilar React en el navegador -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @media print {
            body { background-color: white !important; }
            .print\:hidden { display: none !important; }
            .print\:block { display: block !important; }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans">
    
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        // --- CONFIGURACIÓN DE FIREBASE ---
        const firebaseConfig = {
            apiKey: "AIzaSyAe0UIel7Q-0LJZhH4mexFA2KqXpP5xU_M",
            authDomain: "proyect-management-c27ab.firebaseapp.com",
            projectId: "proyect-management-c27ab",
            storageBucket: "proyect-management-c27ab.firebasestorage.app",
            messagingSenderId: "205245994641",
            appId: "1:205245994641:web:6526e83a61bc2771501130",
            measurementId: "G-FFWQE1M6XE"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const auth = firebase.auth();
        const db = firebase.firestore();
        const appId = 'mi-app-diseno';

        function App() {
            // Estados Principales
            const [orders, setOrders] = useState([]);
            const [clientsList, setClientsList] = useState([]);
            const [activitiesList, setActivitiesList] = useState([]); // Nuevo estado para las actividades del calendario
            const [user, setUser] = useState(null);
            const [authChecking, setAuthChecking] = useState(true);
            const [loadingData, setLoadingData] = useState(false);
            
            // Estados de Login
            const [authEmail, setAuthEmail] = useState('');
            const [authPassword, setAuthPassword] = useState('');
            const [isRegistering, setIsRegistering] = useState(false);
            const [authError, setAuthError] = useState('');

            const [modal, setModal] = useState({ isOpen: false, type: '', message: '', data: null, actionType: '' });
            const [activityModal, setActivityModal] = useState({ isOpen: false, date: '', desc: '', horas: '', ordenId: '' });

            const [view, setView] = useState('dashboard');
            const [searchTerm, setSearchTerm] = useState('');
            const [editingId, setEditingId] = useState(null);
            const [clientToPrint, setClientToPrint] = useState(null);
            
            const [statusFilter, setStatusFilter] = useState('Todos');
            const [showFinances, setShowFinances] = useState(true);
            const [financeClientFilter, setFinanceClientFilter] = useState('Todos');
            const [dashboardClientFilter, setDashboardClientFilter] = useState('Todos');
            const [ordersClientFilter, setOrdersClientFilter] = useState('Todos');
            const [dashboardServiceFilter, setDashboardServiceFilter] = useState('Todos');
            const [financeToPrint, setFinanceToPrint] = useState(null); // 'all' o 'pending'

            // Nuevos Estados para Calendario, Ingresos y Botón Guardar
            const [isSaving, setIsSaving] = useState(false);
            const [calendarDate, setCalendarDate] = useState(new Date());
            const [incomeMonth, setIncomeMonth] = useState(new Date().toISOString().slice(0, 7));

            // Formularios
            const [formData, setFormData] = useState({
                cliente: '', empresa: '', telefono: '', servicio: '', extras: '',
                costoTotal: '', depositos: [], estado: 'Pendiente', imagenes: [],
                fechaSolicitud: new Date().toISOString().split('T')[0],
                tipoServicio: 'Diseños'
            });

            const [clientFormData, setClientFormData] = useState({
                nombre: '', telefono: '', empresas: ['']
            });

            // 1. Control de Autenticación
            useEffect(() => {
                const unsubscribe = auth.onAuthStateChanged((currentUser) => {
                    setUser(currentUser);
                    setAuthChecking(false);
                });
                return () => unsubscribe();
            }, []);

            // 2. Cargar datos desde Firestore
            useEffect(() => {
                if (!user) return;
                setLoadingData(true);
                
                const ordersRef = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('orders');
                const unsubscribeOrders = ordersRef.onSnapshot((snapshot) => {
                    const fetchedOrders = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    fetchedOrders.sort((a, b) => b.id.localeCompare(a.id));
                    setOrders(fetchedOrders);
                }, (error) => console.error(error));

                const clientsRef = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('clients');
                const unsubscribeClients = clientsRef.onSnapshot((snapshot) => {
                    const fetchedClients = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    fetchedClients.sort((a, b) => a.nombre.localeCompare(b.nombre));
                    setClientsList(fetchedClients);
                }, (error) => console.error(error));

                const activitiesRef = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('activities');
                const unsubscribeActivities = activitiesRef.onSnapshot((snapshot) => {
                    const fetchedActivities = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setActivitiesList(fetchedActivities);
                    setLoadingData(false);
                }, (error) => {
                    console.error("Error al obtener actividades:", error);
                    setLoadingData(false);
                });

                return () => {
                    unsubscribeOrders();
                    unsubscribeClients();
                    unsubscribeActivities();
                };
            }, [user]);

            // --- Manejador de Login/Registro ---
            const handleAuth = async (e) => {
                e.preventDefault();
                setAuthError('');
                try {
                    if (isRegistering) {
                        await auth.createUserWithEmailAndPassword(authEmail, authPassword);
                    } else {
                        await auth.signInWithEmailAndPassword(authEmail, authPassword);
                    }
                } catch (error) {
                    console.error("Error de autenticación:", error);
                    if (error.code === 'auth/email-already-in-use') setAuthError('Este correo ya está registrado.');
                    else if (error.code === 'auth/wrong-password' || error.code === 'auth/invalid-credential') setAuthError('Correo o contraseña incorrectos.');
                    else if (error.code === 'auth/user-not-found') setAuthError('Usuario no encontrado.');
                    else if (error.code === 'auth/weak-password') setAuthError('La contraseña debe tener al menos 6 caracteres.');
                    else if (error.code === 'auth/operation-not-allowed') setAuthError('Error: Aún no has activado el registro en Firebase. Ve a Authentication > Sign-in method y habilita Correo/Contraseña.');
                    else setAuthError('Ocurrió un error: ' + error.message);
                }
            };

            // --- Cálculos y Estadísticas ---
            const stats = useMemo(() => {
                const clientsCount = clientsList.length;
                const activeCount = orders.filter(o => o.estado === 'Pendiente').length;
                const completedCount = orders.filter(o => o.estado === 'Completado').length;
                const cancelledCount = orders.filter(o => o.estado === 'Cancelado').length;
                const totalRevenue = orders.filter(o => o.estado !== 'Cancelado').reduce((sum, o) => sum + o.costoTotal, 0);
                const pendingMoney = orders.filter(o => o.estado === 'Pendiente').reduce((sum, o) => sum + (o.costoTotal - o.adelanto), 0);
                return { clientsCount, activeCount, completedCount, cancelledCount, totalRevenue, pendingMoney };
            }, [orders, clientsList]);

            const clientsWithStats = useMemo(() => {
                return clientsList.map(client => {
                    const clientOrders = orders.filter(o => o.cliente === client.nombre);
                    const totalPedidos = clientOrders.length;
                    const saldoPendiente = clientOrders.filter(o => o.estado === 'Pendiente').reduce((sum, o) => sum + (o.costoTotal - o.adelanto), 0);
                    return { ...client, totalPedidos, saldoPendiente, ordenes: clientOrders };
                });
            }, [clientsList, orders]);

            const goTo = (newView) => { setView(newView); setSearchTerm(''); };

            // --- Manejadores de ÓRDENES ---
            const handleNewOrder = () => {
                setFormData({
                    cliente: '', empresa: '', telefono: '', servicio: '', extras: '', costoTotal: '',
                    depositos: [], estado: 'Pendiente', imagenes: [],
                    fechaSolicitud: new Date().toISOString().split('T')[0],
                    tipoServicio: 'Diseños'
                });
                setEditingId(null);
                goTo('form');
            };

            const handleEditOrder = (order) => {
                setFormData({ ...order, depositos: order.depositos || [] });
                setEditingId(order.id);
                goTo('form');
            };

            const handleChangeOrder = (e) => {
                const { name, value } = e.target;
                if (name === 'cliente') {
                    const selectedClient = clientsList.find(c => c.nombre === value);
                    setFormData(prev => ({ ...prev, cliente: value, empresa: '', telefono: selectedClient ? selectedClient.telefono : prev.telefono }));
                } else {
                    setFormData(prev => ({ ...prev, [name]: value }));
                }
            };

            const handleSaveOrder = async (e) => {
                e.preventDefault();
                if (isSaving) return; // Evita clics dobles

                if (!formData.cliente || !formData.servicio || !formData.costoTotal) {
                    setModal({ isOpen: true, type: 'alert', message: 'Por favor, llena los campos obligatorios.' }); 
                    return;
                }

                setIsSaving(true);
                const totalAdelanto = (formData.depositos || []).reduce((sum, dep) => sum + (parseFloat(dep.monto) || 0), 0);
                const orderData = { ...formData, costoTotal: parseFloat(formData.costoTotal) || 0, adelanto: totalAdelanto };

                try {
                    const newId = editingId || `ORD-${Math.floor(Math.random() * 10000).toString().padStart(4, '0')}`;
                    await db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('orders').doc(newId).set({ ...orderData, id: newId });
                    goTo('orders');
                } catch (error) {
                    setModal({ isOpen: true, type: 'alert', message: 'Ocurrió un error al guardar.' });
                } finally {
                    setIsSaving(false);
                }
            };

            // --- Manejadores de CLIENTES ---
            const handleNewClient = () => {
                setClientFormData({ nombre: '', telefono: '', empresas: [''] });
                setEditingId(null);
                goTo('client-form');
            };

            const handleEditClient = (client) => {
                setClientFormData({ nombre: client.nombre, telefono: client.telefono || '', empresas: client.empresas && client.empresas.length > 0 ? client.empresas : [''] });
                setEditingId(client.id);
                goTo('client-form');
            };

            const handleClientChange = (e) => {
                const { name, value } = e.target;
                setClientFormData(prev => ({ ...prev, [name]: value }));
            };

            const handleAddEmpresa = () => setClientFormData(prev => ({ ...prev, empresas: [...prev.empresas, ''] }));
            const handleEmpresaChange = (index, value) => {
                const newEmpresas = [...clientFormData.empresas];
                newEmpresas[index] = value;
                setClientFormData(prev => ({ ...prev, empresas: newEmpresas }));
            };
            const handleRemoveEmpresa = (index) => setClientFormData(prev => ({ ...prev, empresas: prev.empresas.filter((_, i) => i !== index) }));

            const handleSaveClient = async (e) => {
                e.preventDefault();
                if (!clientFormData.nombre) { setModal({ isOpen: true, type: 'alert', message: 'El nombre es obligatorio.' }); return; }
                const cleanEmpresas = clientFormData.empresas.filter(emp => emp.trim() !== '');
                const clientData = { nombre: clientFormData.nombre, telefono: clientFormData.telefono, empresas: cleanEmpresas };

                try {
                    const newId = editingId || `CLI-${Math.floor(Math.random() * 10000).toString().padStart(4, '0')}`;
                    await db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('clients').doc(newId).set({ ...clientData, id: newId });
                    goTo('clients');
                } catch (error) { setModal({ isOpen: true, type: 'alert', message: 'Error al guardar.' }); }
            };

            // --- Manejadores de ACTIVIDADES (Calendario) ---
            const openActivityModal = (dateStr) => {
                setActivityModal({ isOpen: true, date: dateStr, desc: '', horas: '', ordenId: '' });
            };

            const handleSaveActivity = async () => {
                if (!activityModal.desc) return;
                try {
                    const newId = `ACT-${Math.floor(Math.random() * 100000)}`;
                    await db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('activities').doc(newId).set({
                        id: newId,
                        fecha: activityModal.date,
                        descripcion: activityModal.desc,
                        horas: parseFloat(activityModal.horas) || 0,
                        ordenId: activityModal.ordenId
                    });
                    setActivityModal({ ...activityModal, isOpen: false });
                } catch(error) {
                    console.error("Error al guardar actividad:", error);
                }
            };

            // --- ELIMINAR ---
            const requestDelete = (e, type, id) => {
                e.stopPropagation();
                let message = '¿Estás seguro de continuar?';
                if (type === 'order') message = '¿Deseas eliminar esta orden?';
                if (type === 'client') message = '¿Deseas eliminar a este cliente?';
                if (type === 'activity') message = '¿Deseas eliminar esta actividad del calendario?';

                setModal({ isOpen: true, type: 'confirm', message, data: id, actionType: type });
            };

            const confirmModalAction = async () => {
                if (modal.type === 'confirm' && modal.data && user) {
                    try {
                        let collectionName = 'orders';
                        if (modal.actionType === 'client') collectionName = 'clients';
                        if (modal.actionType === 'activity') collectionName = 'activities';

                        await db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection(collectionName).doc(modal.data).delete();
                    } catch (error) {}
                }
                setModal({ isOpen: false, type: '', message: '', data: null, actionType: '' });
            };

            const handlePrint = (client) => setClientToPrint(client); 
            const handlePrintFinance = (type) => setFinanceToPrint(type); // 'all' o 'pending'

            // Efecto robusto para impresión
            useEffect(() => {
                if (clientToPrint || financeToPrint) {
                    const timer = setTimeout(() => {
                        window.print();
                        if (clientToPrint) setClientToPrint(null);
                        if (financeToPrint) setFinanceToPrint(null);
                    }, 800);
                    return () => clearTimeout(timer);
                }
            }, [clientToPrint, financeToPrint]);

            // Depósitos e Imágenes
            const handleAddDeposito = () => setFormData(prev => ({...prev, depositos: [...(prev.depositos || []), { monto: '', fecha: new Date().toISOString().split('T')[0] }]}));
            const handleDepositoChange = (index, field, value) => {
                const newDepositos = [...(formData.depositos || [])];
                newDepositos[index] = { ...newDepositos[index], [field]: value };
                setFormData(prev => ({ ...prev, depositos: newDepositos }));
            };
            const handleRemoveDeposito = (index) => setFormData(prev => ({ ...prev, depositos: (prev.depositos || []).filter((_, i) => i !== index) }));
            const handleImageUpload = (e) => {
                const files = Array.from(e.target.files);
                Promise.all(files.map(file => {
                    return new Promise((resolve, reject) => {
                        const reader = new FileReader();
                        reader.readAsDataURL(file);
                        reader.onload = () => resolve(reader.result);
                        reader.onerror = error => reject(error);
                    });
                })).then(base64Images => setFormData(prev => ({ ...prev, imagenes: [...(prev.imagenes || []), ...base64Images] })));
            };
            const removeImage = (index) => setFormData(prev => ({ ...prev, imagenes: prev.imagenes.filter((_, i) => i !== index) }));

            const filteredOrders = orders.filter(o => 
                (statusFilter === 'Todos' || o.estado === statusFilter) &&
                (ordersClientFilter === 'Todos' || o.cliente === ordersClientFilter) &&
                (o.cliente.toLowerCase().includes(searchTerm.toLowerCase()) || o.servicio.toLowerCase().includes(searchTerm.toLowerCase()) || o.id.toLowerCase().includes(searchTerm.toLowerCase()))
            );

            const filteredClients = clientsWithStats.filter(c => c.nombre.toLowerCase().includes(searchTerm.toLowerCase()));
            const formTotalAdelanto = (formData.depositos || []).reduce((sum, dep) => sum + (parseFloat(dep.monto) || 0), 0);
            const selectedClientData = clientsList.find(c => c.nombre === formData.cliente);
            const clientCompanies = selectedClientData?.empresas || [];

            // Opciones y lógica de filtrado para Finanzas (Cliente + Empresa)
            const financeFilterOptions = useMemo(() => {
                const options = new Set();
                orders.forEach(o => {
                    if (o.cliente) options.add(o.cliente);
                    if (o.cliente && o.empresa) options.add(`${o.cliente} - ${o.empresa}`);
                });
                return Array.from(options).sort();
            }, [orders]);

            const isFinanceMatch = (o) => {
                if (financeClientFilter === 'Todos') return true;
                if (financeClientFilter.includes(' - ')) {
                    const [cName, cEmp] = financeClientFilter.split(' - ');
                    return o.cliente === cName && o.empresa === cEmp;
                }
                return o.cliente === financeClientFilter;
            };

            // Datos de Ingresos
            const depositsData = useMemo(() => {
                const allDeps = [];
                let monthlyTotal = 0;
                orders.forEach(o => {
                    if (o.depositos) {
                        o.depositos.forEach(dep => {
                            const depDate = dep.fecha || '';
                            const isCurrentMonth = depDate.startsWith(incomeMonth);
                            if (isCurrentMonth) {
                                monthlyTotal += parseFloat(dep.monto) || 0;
                            }
                            allDeps.push({
                                ...dep,
                                isCurrentMonth,
                                ordenId: o.id,
                                cliente: o.cliente,
                                actividad: o.servicio // mapeo de Actividad
                            });
                        });
                    }
                });
                allDeps.sort((a, b) => new Date(b.fecha) - new Date(a.fecha));
                return { all: allDeps, monthlyTotal };
            }, [orders, incomeMonth]);

            // Datos de Calendario
            const firstDayOfMonth = new Date(calendarDate.getFullYear(), calendarDate.getMonth(), 1).getDay();
            const daysInMonth = new Date(calendarDate.getFullYear(), calendarDate.getMonth() + 1, 0).getDate();
            const prevMonth = () => setCalendarDate(new Date(calendarDate.getFullYear(), calendarDate.getMonth() - 1, 1));
            const nextMonth = () => setCalendarDate(new Date(calendarDate.getFullYear(), calendarDate.getMonth() + 1, 1));
            
            const calendarDays = Array.from({ length: daysInMonth }, (_, i) => {
                const day = i + 1;
                // Formato YYYY-MM-DD resistente a zonas horarias
                const dateStr = `${calendarDate.getFullYear()}-${String(calendarDate.getMonth() + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                const dayOrders = orders.filter(o => o.estado === 'Pendiente' && o.fechaSolicitud === dateStr);
                const dayActivities = activitiesList.filter(a => a.fecha === dateStr);
                return { day, dateStr, dayOrders, dayActivities };
            });

            // PANTALLA DE CARGA INICIAL
            if (authChecking) {
                return (
                    <div className="min-h-screen bg-slate-50 flex flex-col items-center justify-center text-indigo-600">
                        <i className="fa-solid fa-spinner fa-spin mb-4 text-5xl"></i>
                    </div>
                );
            }

            // PANTALLA DE LOGIN
            if (!user) {
                return (
                    <div className="min-h-screen bg-slate-100 flex items-center justify-center p-4 relative overflow-hidden">
                        <div className="absolute top-[-10%] left-[-10%] w-96 h-96 bg-indigo-300 rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-blob"></div>
                        <div className="absolute top-[20%] right-[-10%] w-96 h-96 bg-orange-300 rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-blob animation-delay-2000"></div>
                        <div className="bg-white p-8 rounded-2xl shadow-xl max-w-md w-full relative z-10">
                            <div className="text-center mb-8">
                                <div className="bg-indigo-600 text-white w-16 h-16 rounded-xl flex items-center justify-center mx-auto mb-4 shadow-lg"><i className="fa-solid fa-briefcase text-3xl"></i></div>
                                <h2 className="text-2xl font-bold text-slate-800">DesignManager Pro</h2>
                                <p className="text-slate-500 mt-2">{isRegistering ? 'Crea tu cuenta administradora' : 'Inicia sesión para gestionar tus órdenes'}</p>
                            </div>
                            <form onSubmit={handleAuth} className="space-y-5">
                                <div>
                                    <label className="block text-sm font-medium text-slate-700 mb-1">Correo Electrónico</label>
                                    <input type="email" required value={authEmail} onChange={e=>setAuthEmail(e.target.value)} className="w-full p-3 border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none" placeholder="tu@correo.com" />
                                </div>
                                <div>
                                    <label className="block text-sm font-medium text-slate-700 mb-1">Contraseña</label>
                                    <input type="password" required value={authPassword} onChange={e=>setAuthPassword(e.target.value)} className="w-full p-3 border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none" placeholder="••••••••" />
                                </div>
                                {authError && <div className="bg-red-50 text-red-600 p-3 rounded-lg text-sm flex items-start gap-2 text-left leading-tight"><i className="fa-solid fa-circle-exclamation mt-0.5"></i> <span>{authError}</span></div>}
                                <button type="submit" className="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold p-3 rounded-lg transition-colors shadow-md">
                                    {isRegistering ? 'Crear Cuenta' : 'Ingresar al Sistema'}
                                </button>
                            </form>
                            <div className="mt-6 text-center">
                                <button type="button" onClick={()=>{setIsRegistering(!isRegistering); setAuthError('');}} className="text-sm text-indigo-600 hover:text-indigo-800 font-medium">
                                    {isRegistering ? '¿Ya tienes cuenta? Inicia sesión aquí' : '¿No tienes cuenta? Regístrate aquí'}
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen">
                    
                    {/* Modal Confirmación / Alertas */}
                    {modal.isOpen && (
                        <div className="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
                            <div className="bg-white rounded-xl shadow-xl max-w-md w-full p-6">
                                <div className="flex items-center gap-3 mb-4">
                                    {modal.type === 'alert' ? <i className="fa-solid fa-circle-exclamation text-orange-500 text-2xl"></i> : <i className="fa-solid fa-circle-exclamation text-red-500 text-2xl"></i>}
                                    <h3 className="text-lg font-bold text-slate-800">{modal.type === 'alert' ? 'Aviso' : 'Confirmar Acción'}</h3>
                                </div>
                                <p className="text-slate-600 mb-6">{modal.message}</p>
                                <div className="flex justify-end gap-3">
                                    {modal.type === 'confirm' && (<button onClick={() => setModal({ isOpen: false })} className="px-4 py-2 rounded-lg text-slate-600 font-medium hover:bg-slate-100 transition-colors">Cancelar</button>)}
                                    <button onClick={confirmModalAction} className={`px-4 py-2 rounded-lg font-medium text-white transition-colors ${modal.type === 'alert' ? 'bg-indigo-600 hover:bg-indigo-700' : 'bg-red-600 hover:bg-red-700'}`}>{modal.type === 'alert' ? 'Entendido' : 'Sí, eliminar'}</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Modal Actividad Calendario */}
                    {activityModal.isOpen && (
                        <div className="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
                            <div className="bg-white rounded-xl shadow-xl max-w-md w-full p-6">
                                <h3 className="text-lg font-bold text-slate-800 mb-4 flex items-center gap-2">
                                    <i className="fa-solid fa-clock-rotate-left text-emerald-500"></i> Registrar Actividad
                                </h3>
                                <div className="space-y-4">
                                    <div>
                                        <label className="block text-xs font-bold text-slate-500 mb-1">Fecha</label>
                                        <input type="text" readOnly value={activityModal.date} className="w-full border border-slate-200 bg-slate-50 p-2 rounded-lg text-sm font-medium" />
                                    </div>
                                    <div>
                                        <label className="block text-xs font-bold text-slate-500 mb-1">Descripción de la tarea *</label>
                                        <input type="text" value={activityModal.desc} onChange={(e) => setActivityModal({...activityModal, desc: e.target.value})} className="w-full border border-slate-200 focus:ring-2 focus:ring-emerald-500 outline-none p-2 rounded-lg text-sm" placeholder="Ej: Visita al cliente, diseño preliminar..." />
                                    </div>
                                    <div>
                                        <label className="block text-xs font-bold text-slate-500 mb-1">Horas Invertidas</label>
                                        <input type="number" step="0.5" min="0" value={activityModal.horas} onChange={(e) => setActivityModal({...activityModal, horas: e.target.value})} className="w-full border border-slate-200 focus:ring-2 focus:ring-emerald-500 outline-none p-2 rounded-lg text-sm" placeholder="Ej: 2.5" />
                                    </div>
                                    <div>
                                        <label className="block text-xs font-bold text-slate-500 mb-1">Vincular a Proyecto (Opcional)</label>
                                        <select value={activityModal.ordenId} onChange={(e) => setActivityModal({...activityModal, ordenId: e.target.value})} className="w-full border border-slate-200 focus:ring-2 focus:ring-emerald-500 outline-none p-2 rounded-lg text-sm bg-white">
                                            <option value="">-- Sin vincular --</option>
                                            {orders.filter(o => o.estado === 'Pendiente').map(o => (
                                                <option key={o.id} value={o.id}>{o.cliente} - {o.servicio.substring(0,20)}...</option>
                                            ))}
                                        </select>
                                    </div>
                                </div>
                                <div className="flex justify-end gap-3 mt-6 pt-4 border-t border-slate-100">
                                    <button onClick={() => setActivityModal({...activityModal, isOpen: false})} className="px-4 py-2 bg-slate-100 hover:bg-slate-200 text-slate-700 rounded-lg text-sm font-bold transition-colors">Cancelar</button>
                                    <button onClick={handleSaveActivity} disabled={!activityModal.desc} className={`px-4 py-2 text-white rounded-lg text-sm font-bold transition-colors ${!activityModal.desc ? 'bg-slate-300 cursor-not-allowed' : 'bg-emerald-600 hover:bg-emerald-700'}`}>Guardar Actividad</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Vista PDF de Clientes */}
                    {clientToPrint && (
                        <div className="hidden print:block absolute top-0 left-0 w-full bg-white p-8 z-50">
                            <div className="border-b-2 border-indigo-600 pb-6 mb-6 flex justify-between items-end">
                                <div><h1 className="text-3xl font-bold text-slate-800">Estado de Cuenta</h1><p className="text-slate-500 mt-1">DesignManager Pro</p></div>
                                <div className="text-right"><p className="font-bold text-slate-800">{clientToPrint.nombre}</p><p className="text-slate-500">Tel: {clientToPrint.telefono || 'N/A'}</p><p className="text-slate-500">Fecha: {new Date().toLocaleDateString()}</p></div>
                            </div>
                            <h2 className="text-xl font-bold mb-4 text-slate-700">Resumen de Órdenes Pendientes</h2>
                            <table className="w-full text-left border-collapse">
                                <thead>
                                    <tr className="bg-slate-100 text-slate-700">
                                        <th className="p-3 border-b">ID Orden / Empresa</th><th className="p-3 border-b">Actividad</th><th className="p-3 border-b text-right">Costo Total</th><th className="p-3 border-b text-right">Abonado</th><th className="p-3 border-b text-right font-bold">Pendiente</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {clientToPrint.ordenes.filter(o => o.estado === 'Pendiente').map(o => {
                                        const pendiente = o.costoTotal - o.adelanto;
                                        return (
                                            <tr key={o.id} className="border-b">
                                                <td className="p-3 text-sm text-slate-600">{o.id} <br/>{o.empresa && <span className="font-bold text-indigo-500 text-xs">{o.empresa}</span>}</td>
                                                <td className="p-3 text-sm text-slate-800">{o.servicio}</td>
                                                <td className="p-3 text-sm text-right">S/ {o.costoTotal.toFixed(2)}</td>
                                                <td className="p-3 text-sm text-right text-emerald-600">S/ {o.adelanto.toFixed(2)}</td>
                                                <td className="p-3 text-sm text-right font-bold text-orange-600">S/ {pendiente.toFixed(2)}</td>
                                            </tr>
                                        );
                                    })}
                                    {clientToPrint.ordenes.filter(o => o.estado === 'Pendiente').length === 0 && (<tr><td colSpan="5" className="p-4 text-center text-slate-500">No hay órdenes con saldo pendiente.</td></tr>)}
                                </tbody>
                                <tfoot><tr className="bg-slate-50"><td colSpan="4" className="p-3 text-right font-bold text-slate-700">TOTAL A PAGAR:</td><td className="p-3 text-right font-bold text-xl text-indigo-600">S/ {clientToPrint.saldoPendiente.toFixed(2)}</td></tr></tfoot>
                            </table>
                        </div>
                    )}

                    {/* Vista PDF de Finanzas */}
                    {financeToPrint && (
                        <div className="hidden print:block absolute top-0 left-0 w-full bg-white p-8 z-50">
                            <div className="border-b-2 border-indigo-600 pb-6 mb-6 flex justify-between items-end">
                                <div>
                                    <h1 className="text-3xl font-bold text-slate-800">
                                        {financeToPrint === 'pending' ? 'Reporte de Saldos Pendientes' : 'Reporte Financiero Total'}
                                    </h1>
                                    <p className="text-slate-500 mt-1">DesignManager Pro</p>
                                </div>
                                <div className="text-right">
                                    <p className="font-bold text-slate-800">Filtro: {financeClientFilter}</p>
                                    <p className="text-slate-500">Fecha: {new Date().toLocaleDateString()}</p>
                                </div>
                            </div>
                            <table className="w-full text-left border-collapse">
                                <thead>
                                    <tr className="bg-slate-100 text-slate-700">
                                        <th className="p-3 border-b">Cliente / Empresa</th><th className="p-3 border-b">Actividad</th><th className="p-3 border-b text-right">Facturado</th><th className="p-3 border-b text-right">Abonado</th><th className="p-3 border-b text-right font-bold">Pendiente</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {orders.filter(isFinanceMatch).filter(o => financeToPrint === 'pending' ? (o.costoTotal - o.adelanto) > 0 : true).map(o => {
                                        const pendiente = o.costoTotal - o.adelanto;
                                        return (
                                            <tr key={o.id} className="border-b">
                                                <td className="p-3 text-sm text-slate-600 font-bold">{o.cliente} <br/>{o.empresa && <span className="font-normal text-indigo-500 text-xs">{o.empresa}</span>}</td>
                                                <td className="p-3 text-sm text-slate-800">{o.servicio}</td>
                                                <td className="p-3 text-sm text-right">S/ {o.costoTotal.toFixed(2)}</td>
                                                <td className="p-3 text-sm text-right text-emerald-600">S/ {o.adelanto.toFixed(2)}</td>
                                                <td className="p-3 text-sm text-right font-bold text-orange-600">S/ {pendiente.toFixed(2)}</td>
                                            </tr>
                                        );
                                    })}
                                </tbody>
                                <tfoot>
                                    <tr className="bg-slate-50">
                                        <td colSpan="2" className="p-3 text-right font-bold text-slate-700">TOTALES:</td>
                                        <td className="p-3 text-right font-bold text-slate-800">S/ {orders.filter(o => o.estado !== 'Cancelado').filter(isFinanceMatch).filter(o => financeToPrint === 'pending' ? (o.costoTotal - o.adelanto) > 0 : true).reduce((sum, o) => sum + o.costoTotal, 0).toFixed(2)}</td>
                                        <td className="p-3 text-right font-bold text-emerald-600">S/ {orders.filter(isFinanceMatch).filter(o => financeToPrint === 'pending' ? (o.costoTotal - o.adelanto) > 0 : true).reduce((sum, o) => sum + o.adelanto, 0).toFixed(2)}</td>
                                        <td className="p-3 text-right font-bold text-xl text-orange-600">S/ {orders.filter(o => o.estado === 'Pendiente').filter(isFinanceMatch).filter(o => financeToPrint === 'pending' ? (o.costoTotal - o.adelanto) > 0 : true).reduce((sum, o) => sum + (o.costoTotal - o.adelanto), 0).toFixed(2)}</td>
                                    </tr>
                                </tfoot>
                            </table>
                        </div>
                    )}

                    {/* INTERFAZ PRINCIPAL */}
                    <div className="print:hidden">
                        <nav className="bg-indigo-600 text-white p-4 shadow-md sticky top-0 z-40">
                            <div className="max-w-6xl mx-auto flex flex-col sm:flex-row justify-between items-center gap-4">
                                <div className="flex items-center gap-2 cursor-pointer" onClick={() => goTo('dashboard')}>
                                    <i className="fa-solid fa-briefcase text-2xl"></i>
                                    <h1 className="text-xl font-bold">DesignManager Pro</h1>
                                </div>
                                <div className="flex items-center gap-4">
                                    <div className="flex bg-indigo-700 rounded-lg p-1 overflow-x-auto">
                                        <button onClick={() => goTo('dashboard')} className={`px-4 py-2 rounded-md flex items-center gap-2 text-sm font-medium transition-colors ${view === 'dashboard' ? 'bg-white text-indigo-700 shadow' : 'text-indigo-100 hover:text-white hover:bg-indigo-600'}`}>
                                            <i className="fa-solid fa-table-cells-large"></i> <span className="hidden sm:inline">Índice</span>
                                        </button>
                                        <button onClick={() => goTo('calendar')} className={`px-4 py-2 rounded-md flex items-center gap-2 text-sm font-medium transition-colors ${view === 'calendar' ? 'bg-white text-indigo-700 shadow' : 'text-indigo-100 hover:text-white hover:bg-indigo-600'}`}>
                                            <i className="fa-solid fa-calendar-days"></i> <span className="hidden sm:inline">Calendario</span>
                                        </button>
                                        <button onClick={() => goTo('orders')} className={`px-4 py-2 rounded-md flex items-center gap-2 text-sm font-medium transition-colors ${view === 'orders' || view === 'form' ? 'bg-white text-indigo-700 shadow' : 'text-indigo-100 hover:text-white hover:bg-indigo-600'}`}>
                                            <i className="fa-solid fa-file-lines"></i> <span className="hidden sm:inline">Órdenes</span>
                                        </button>
                                        <button onClick={() => goTo('clients')} className={`px-4 py-2 rounded-md flex items-center gap-2 text-sm font-medium transition-colors ${view === 'clients' || view === 'client-form' ? 'bg-white text-indigo-700 shadow' : 'text-indigo-100 hover:text-white hover:bg-indigo-600'}`}>
                                            <i className="fa-solid fa-users"></i> <span className="hidden sm:inline">Clientes</span>
                                        </button>
                                        <button onClick={() => goTo('finances')} className={`px-4 py-2 rounded-md flex items-center gap-2 text-sm font-medium transition-colors ${view === 'finances' ? 'bg-white text-indigo-700 shadow' : 'text-indigo-100 hover:text-white hover:bg-indigo-600'}`}>
                                            <i className="fa-solid fa-chart-pie"></i> <span className="hidden sm:inline">Finanzas</span>
                                        </button>
                                        <button onClick={() => goTo('income')} className={`px-4 py-2 rounded-md flex items-center gap-2 text-sm font-medium transition-colors ${view === 'income' ? 'bg-white text-indigo-700 shadow' : 'text-indigo-100 hover:text-white hover:bg-indigo-600'}`}>
                                            <i className="fa-solid fa-money-bill-wave"></i> <span className="hidden sm:inline">Ingresos</span>
                                        </button>
                                    </div>
                                    <button onClick={() => auth.signOut()} title="Cerrar Sesión" className="text-indigo-200 hover:text-white bg-indigo-800 p-2 rounded-lg transition-colors">
                                        <i className="fa-solid fa-right-from-bracket"></i>
                                    </button>
                                </div>
                            </div>
                        </nav>

                        <main className="max-w-6xl mx-auto p-4 mt-4">
                            {loadingData && (
                                <div className="text-center py-10">
                                    <i className="fa-solid fa-spinner fa-spin text-3xl text-indigo-600 mb-2"></i>
                                    <p className="text-slate-500">Cargando datos...</p>
                                </div>
                            )}

                            {/* DASHBOARD */}
                            {!loadingData && view === 'dashboard' && (
                                <div className="space-y-6">
                                    <h2 className="text-2xl font-bold text-slate-800">Resumen de tu Negocio</h2>
                                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                                        <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-100 flex items-center gap-4 border-l-4 border-l-indigo-500"><div className="p-3 bg-indigo-50 text-indigo-600 rounded-full"><i className="fa-solid fa-users text-2xl"></i></div><div><p className="text-sm text-slate-500 font-medium">Total Clientes</p><p className="text-2xl font-bold text-slate-800">{stats.clientsCount}</p></div></div>
                                        <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-100 flex items-center gap-4 border-l-4 border-l-orange-500"><div className="p-3 bg-orange-50 text-orange-600 rounded-full"><i className="fa-solid fa-clock text-2xl"></i></div><div><p className="text-sm text-slate-500 font-medium">Órdenes Activas</p><p className="text-2xl font-bold text-slate-800">{stats.activeCount}</p></div></div>
                                        <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-100 flex items-center gap-4 border-l-4 border-l-emerald-500"><div className="p-3 bg-emerald-50 text-emerald-600 rounded-full"><i className="fa-solid fa-circle-check text-2xl"></i></div><div><p className="text-sm text-slate-500 font-medium">Completadas</p><p className="text-2xl font-bold text-slate-800">{stats.completedCount}</p></div></div>
                                        <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-100 flex items-center gap-4 border-l-4 border-l-red-500"><div className="p-3 bg-red-50 text-red-600 rounded-full"><i className="fa-solid fa-circle-xmark text-2xl"></i></div><div><p className="text-sm text-slate-500 font-medium">Canceladas</p><p className="text-2xl font-bold text-slate-800">{stats.cancelledCount}</p></div></div>
                                    </div>

                                    <div className="mt-6">
                                        <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-100">
                                            <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-4">
                                                <h3 className="text-lg font-bold text-slate-700 flex items-center gap-2"><i className="fa-solid fa-clock text-orange-500 text-xl"></i> Órdenes Pendientes</h3>
                                                <div className="flex gap-2 w-full sm:w-auto">
                                                    <select value={dashboardClientFilter} onChange={(e) => setDashboardClientFilter(e.target.value)} className="w-full sm:w-auto p-2 rounded-lg border border-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm font-medium text-slate-600 bg-slate-50">
                                                        <option value="Todos">Todos los clientes</option>
                                                        {clientsList.map(c => <option key={c.id} value={c.nombre}>{c.nombre}</option>)}
                                                    </select>
                                                    <select value={dashboardServiceFilter} onChange={(e) => setDashboardServiceFilter(e.target.value)} className="w-full sm:w-auto p-2 rounded-lg border border-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm font-medium text-slate-600 bg-slate-50">
                                                        <option value="Todos">Todos los servicios</option>
                                                        <option value="Logística">Logística</option>
                                                        <option value="Reingeniería">Reingeniería</option>
                                                        <option value="Diseños">Diseños</option>
                                                        <option value="Visitas Técnicas">Visitas Técnicas</option>
                                                        <option value="Delivery">Delivery</option>
                                                        <option value="Calidad">Calidad</option>
                                                    </select>
                                                </div>
                                            </div>
                                            <div className="grid gap-4 md:grid-cols-2 lg:grid-cols-3">
                                                {orders.filter(o => o.estado === 'Pendiente' && (dashboardClientFilter === 'Todos' || o.cliente === dashboardClientFilter) && (dashboardServiceFilter === 'Todos' || o.tipoServicio === dashboardServiceFilter)).length === 0 ? (
                                                    <p className="text-slate-500 col-span-full py-4 text-center">No hay órdenes pendientes en este momento.</p>
                                                ) : (
                                                    orders.filter(o => o.estado === 'Pendiente' && (dashboardClientFilter === 'Todos' || o.cliente === dashboardClientFilter) && (dashboardServiceFilter === 'Todos' || o.tipoServicio === dashboardServiceFilter)).map(o => {
                                                        const ultimoPago = o.depositos && o.depositos.length > 0 ? o.depositos[o.depositos.length - 1].fecha : 'Sin pagos';
                                                        return (
                                                            <div key={o.id} className="flex justify-between items-start p-4 hover:bg-slate-50 rounded-lg border border-orange-100 cursor-pointer shadow-sm transition-colors" onClick={() => handleEditOrder(o)}>
                                                                <div>
                                                                    <p className="font-bold text-sm text-slate-800">{o.cliente}</p>
                                                                    {o.empresa && <p className="text-xs font-medium text-indigo-500 mb-1"><i className="fa-solid fa-building"></i> {o.empresa}</p>}
                                                                    <p className="text-xs text-indigo-600 font-bold mt-1 bg-indigo-50 inline-block px-2 py-0.5 rounded"><i className="fa-solid fa-tag"></i> {o.tipoServicio || 'Diseños'}</p>
                                                                    <p className="text-xs text-slate-500 mt-1 line-clamp-2">{o.servicio}</p>
                                                                    <span className="text-xs text-slate-400 mt-2 flex items-center gap-1"><i className="fa-solid fa-calendar text-xs"></i> Solicitud: {o.fechaSolicitud || 'N/A'}</span>
                                                                </div>
                                                                <span className="text-xs px-2 py-1 rounded-full bg-orange-100 text-orange-700 font-medium whitespace-nowrap">Pendiente</span>
                                                            </div>
                                                        )
                                                    })
                                                )}
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* ÓRDENES */}
                            {!loadingData && view === 'orders' && (
                                <div className="space-y-6">
                                    <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 bg-white p-4 rounded-xl shadow-sm border border-slate-100">
                                        <h2 className="text-xl font-bold text-slate-700">Todas las Órdenes</h2>
                                        <div className="flex flex-wrap sm:flex-nowrap gap-2 w-full sm:w-auto">
                                            <select value={statusFilter} onChange={(e) => setStatusFilter(e.target.value)} className="p-2 rounded-lg border border-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm font-medium text-slate-600 bg-slate-50">
                                                <option value="Todos">Todos los estados</option><option value="Pendiente">🟡 Pendientes</option><option value="Completado">🟢 Completados</option><option value="Cancelado">🔴 Cancelados</option>
                                            </select>
                                            <select value={ordersClientFilter} onChange={(e) => setOrdersClientFilter(e.target.value)} className="p-2 rounded-lg border border-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm font-medium text-slate-600 bg-slate-50">
                                                <option value="Todos">Todos los clientes</option>
                                                {clientsList.map(c => <option key={c.id} value={c.nombre}>{c.nombre}</option>)}
                                            </select>
                                            <div className="relative flex-1 sm:w-64">
                                                <i className="fa-solid fa-magnifying-glass absolute left-3 top-3 text-slate-400 text-lg"></i>
                                                <input type="text" placeholder="Buscar orden..." className="w-full pl-10 pr-4 py-2 rounded-lg border border-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500" value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} />
                                            </div>
                                            <button onClick={handleNewOrder} className="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg flex items-center gap-2 transition-colors">
                                                <i className="fa-solid fa-plus text-lg"></i> <span className="hidden sm:inline">Nueva Orden</span>
                                            </button>
                                        </div>
                                    </div>

                                    <div className="grid gap-4 md:grid-cols-2 lg:grid-cols-3">
                                        {filteredOrders.map(order => {
                                            const pendiente = order.costoTotal - order.adelanto;
                                            const ultimoPago = order.depositos && order.depositos.length > 0 ? order.depositos[order.depositos.length - 1].fecha : 'Sin pagos';
                                            return (
                                                <div key={order.id} className={`bg-white rounded-xl shadow-sm border-l-4 p-5 relative group ${order.estado === 'Pendiente' ? 'border-l-orange-400' : order.estado === 'Completado' ? 'border-l-emerald-400' : 'border-l-red-400'} border-t border-r border-b border-slate-100`}>
                                                    <div className="absolute top-4 right-4 flex gap-2">
                                                        <button onClick={() => handleEditOrder(order)} className="p-1.5 bg-slate-50 text-slate-600 rounded-md hover:bg-indigo-50 hover:text-indigo-600"><i className="fa-solid fa-pen"></i></button>
                                                        <button onClick={(e) => requestDelete(e, 'order', order.id)} className="p-1.5 bg-slate-50 text-slate-600 rounded-md hover:bg-red-50 hover:text-red-600"><i className="fa-solid fa-trash"></i></button>
                                                    </div>
                                                    <div className="mb-3">
                                                        <span className="text-xs font-bold text-slate-400">{order.id}</span>
                                                        <h3 className="font-bold text-lg mt-1 text-slate-800">{order.cliente}</h3>
                                                        {order.empresa && <p className="text-xs font-medium text-indigo-500 mb-1"><i className="fa-solid fa-building"></i> {order.empresa}</p>}
                                                        <p className="text-xs text-indigo-600 font-bold mb-1"><i className="fa-solid fa-tag"></i> {order.tipoServicio || 'Diseños'}</p>
                                                        <p className="text-sm text-slate-500 line-clamp-1">{order.servicio}</p>
                                                    </div>
                                                    <div className="space-y-1 mb-3 text-sm text-slate-600 border-t border-slate-100 pt-3">
                                                        <div className="flex justify-between"><span>Costo Total:</span><span>S/ {order.costoTotal.toFixed(2)}</span></div>
                                                        <div className="flex justify-between"><span className="text-slate-400 text-xs">Adelanto ({order.depositos?.length || 0}):</span><span className="text-emerald-600">S/ {order.adelanto.toFixed(2)}</span></div>
                                                        <div className="flex justify-between font-bold"><span>Pendiente:</span><span className={pendiente > 0 ? "text-orange-600" : "text-emerald-600"}>S/ {pendiente.toFixed(2)}</span></div>
                                                    </div>
                                                    <div className="flex justify-between items-center text-xs border-t border-slate-100 pt-3">
                                                        <span className={`px-2 py-1 rounded-full font-medium ${order.estado === 'Pendiente' ? 'bg-orange-100 text-orange-700' : order.estado === 'Completado' ? 'bg-emerald-100 text-emerald-700' : 'bg-red-100 text-red-700'}`}>{order.estado}</span>
                                                        <span className="text-slate-400"><i className="fa-solid fa-calendar text-xs"></i> {ultimoPago}</span>
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            )}

                            {/* CLIENTES (LISTA) */}
                            {!loadingData && view === 'clients' && (
                                <div className="space-y-6">
                                    <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 bg-white p-4 rounded-xl shadow-sm border border-slate-100">
                                        <h2 className="text-xl font-bold text-slate-700">Directorio de Clientes</h2>
                                        <div className="flex flex-wrap sm:flex-nowrap gap-2 w-full sm:w-auto">
                                            <div className="relative flex-1 sm:w-64">
                                                <i className="fa-solid fa-magnifying-glass absolute left-3 top-3 text-slate-400 text-lg"></i>
                                                <input type="text" placeholder="Buscar cliente..." className="w-full pl-10 pr-4 py-2 rounded-lg border border-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500" value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} />
                                            </div>
                                            <button onClick={handleNewClient} className="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg flex items-center gap-2 transition-colors">
                                                <i className="fa-solid fa-plus text-lg"></i> <span className="hidden sm:inline">Nuevo Cliente</span>
                                            </button>
                                        </div>
                                    </div>
                                    <div className="grid gap-4 md:grid-cols-2 lg:grid-cols-3">
                                        {filteredClients.map((client) => (
                                            <div key={client.id} className="bg-white rounded-xl shadow-sm border border-slate-100 p-5 hover:border-indigo-200 transition-colors relative group">
                                                <div className="absolute top-4 right-4 flex gap-2">
                                                    <button onClick={() => handleEditClient(client)} className="p-1.5 bg-slate-50 text-slate-600 rounded-md hover:bg-indigo-50 hover:text-indigo-600"><i className="fa-solid fa-pen"></i></button>
                                                    <button onClick={(e) => requestDelete(e, 'client', client.id)} className="p-1.5 bg-slate-50 text-slate-600 rounded-md hover:bg-red-50 hover:text-red-600"><i className="fa-solid fa-trash"></i></button>
                                                </div>
                                                <div className="flex items-start justify-between mb-4 pr-16">
                                                    <div>
                                                        <h3 className="font-bold text-lg text-slate-800">{client.nombre}</h3>
                                                        <p className="text-sm text-slate-500"><i className="fa-solid fa-phone text-xs"></i> {client.telefono || 'Sin teléfono'}</p>
                                                    </div>
                                                </div>
                                                <div className="mb-4">
                                                    <p className="text-xs font-bold text-slate-400 uppercase tracking-wider mb-1">Empresas Asignadas:</p>
                                                    {client.empresas && client.empresas.length > 0 ? (
                                                        <div className="flex flex-wrap gap-1">
                                                            {client.empresas.map((emp, i) => <span key={i} className="text-xs bg-slate-100 text-slate-600 px-2 py-1 rounded-md border border-slate-200"><i className="fa-solid fa-building mr-1"></i>{emp}</span>)}
                                                        </div>
                                                    ) : (<p className="text-xs text-slate-400 italic">No tiene empresas registradas</p>)}
                                                </div>
                                                <div className="space-y-2 text-sm mb-4 border-t border-slate-100 pt-3">
                                                    <div className="flex justify-between text-slate-600"><span>Total Órdenes:</span> <span className="font-bold">{client.totalPedidos}</span></div>
                                                    <div className="flex justify-between text-slate-600 bg-orange-50 p-2 rounded"><span className="text-orange-800">Saldo Pendiente:</span> <span className="font-bold text-orange-600">S/ {client.saldoPendiente.toFixed(2)}</span></div>
                                                </div>
                                                <button onClick={() => handlePrint(client)} className="w-full flex items-center justify-center gap-2 bg-slate-800 hover:bg-slate-700 text-white py-2 rounded-lg text-sm transition-colors">
                                                    <i className="fa-solid fa-file-pdf"></i> Generar PDF Pendientes
                                                </button>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {/* CLIENTES (FORMULARIO) */}
                            {!loadingData && view === 'client-form' && (
                                <div className="bg-white rounded-xl shadow-lg border border-slate-100 overflow-hidden max-w-2xl mx-auto">
                                    <div className="bg-slate-50 px-6 py-4 border-b border-slate-100 flex items-center gap-3">
                                        <button onClick={() => goTo('clients')} className="p-2 hover:bg-slate-200 rounded-full text-slate-500"><i className="fa-solid fa-arrow-left text-lg"></i></button>
                                        <h2 className="text-xl font-bold text-slate-700">{editingId ? 'Editar Cliente' : 'Nuevo Cliente'}</h2>
                                    </div>
                                    <form onSubmit={handleSaveClient} className="p-6 space-y-6">
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                            <div>
                                                <label className="block text-xs font-medium text-slate-500 mb-1">Nombre Completo *</label>
                                                <input type="text" name="nombre" required className="w-full p-2.5 rounded-lg border border-slate-200 focus:ring-2 focus:ring-indigo-500" value={clientFormData.nombre} onChange={handleClientChange} />
                                            </div>
                                            <div>
                                                <label className="block text-xs font-medium text-slate-500 mb-1">Teléfono</label>
                                                <input type="tel" name="telefono" className="w-full p-2.5 rounded-lg border border-slate-200 focus:ring-2 focus:ring-indigo-500" value={clientFormData.telefono} onChange={handleClientChange} />
                                            </div>
                                        </div>
                                        <div className="bg-slate-50 p-4 rounded-xl border border-slate-200">
                                            <div className="flex justify-between items-center mb-3">
                                                <label className="block text-xs font-bold text-slate-600 uppercase tracking-wider flex items-center gap-1"><i className="fa-solid fa-building text-sm"></i> Empresas del Cliente</label>
                                                <button type="button" onClick={handleAddEmpresa} className="text-xs bg-indigo-100 text-indigo-700 px-3 py-1.5 rounded-md hover:bg-indigo-200 flex items-center gap-1 font-bold transition-colors">
                                                    <i className="fa-solid fa-plus text-sm"></i> Añadir Empresa
                                                </button>
                                            </div>
                                            <div className="space-y-2">
                                                {clientFormData.empresas.map((emp, idx) => (
                                                    <div key={idx} className="flex gap-2 items-center">
                                                        <input type="text" value={emp} onChange={(e) => handleEmpresaChange(idx, e.target.value)} placeholder={`Nombre de la Empresa ${idx + 1}`} className="w-full p-2 text-sm rounded-lg border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none" />
                                                        <button type="button" onClick={() => handleRemoveEmpresa(idx)} className="text-red-400 p-2 hover:bg-red-50 hover:text-red-600 rounded-md transition-colors"><i className="fa-solid fa-trash"></i></button>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                        <div className="pt-4 border-t border-slate-100 flex justify-end gap-3">
                                            <button type="button" onClick={() => goTo('clients')} className="px-6 py-2.5 rounded-lg border border-slate-200 text-slate-600 font-medium hover:bg-slate-50">Cancelar</button>
                                            <button type="submit" className="px-6 py-2.5 rounded-lg bg-indigo-600 text-white font-medium hover:bg-indigo-700 flex items-center gap-2"><i className="fa-solid fa-floppy-disk text-lg"></i> Guardar Cliente</button>
                                        </div>
                                    </form>
                                </div>
                            )}

                            {/* FINANZAS */}
                            {!loadingData && view === 'finances' && (
                                <div className="space-y-6">
                                    <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 bg-white p-4 rounded-xl shadow-sm border border-slate-100">
                                        <h2 className="text-xl font-bold text-slate-700 flex items-center gap-2"><i className="fa-solid fa-chart-pie text-indigo-500 text-2xl"></i> Finanzas y Cobranzas</h2>
                                        <div className="flex gap-2 w-full sm:w-auto">
                                            <div className="relative flex-1 sm:w-64">
                                                <i className="fa-solid fa-filter absolute left-3 top-3 text-slate-400"></i>
                                                <select value={financeClientFilter} onChange={(e) => setFinanceClientFilter(e.target.value)} className="w-full pl-10 pr-4 py-2 rounded-lg border border-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500 appearance-none bg-white text-sm">
                                                    <option value="Todos">Todos los clientes y empresas</option>
                                                    {financeFilterOptions.map(c => <option key={c} value={c}>{c}</option>)}
                                                </select>
                                            </div>
                                            <button onClick={() => setShowFinances(!showFinances)} className="bg-slate-100 hover:bg-slate-200 text-slate-600 px-4 py-2 rounded-lg flex items-center gap-2 transition-colors border border-slate-200" title="Mostrar/Ocultar importes">
                                                {showFinances ? <i className="fa-solid fa-eye-slash text-lg"></i> : <i className="fa-solid fa-eye text-lg"></i>}
                                            </button>
                                            <button onClick={() => handlePrintFinance('all')} className="bg-slate-800 hover:bg-slate-700 text-white px-4 py-2 rounded-lg flex items-center gap-2 transition-colors shadow-sm text-sm font-medium">
                                                <i className="fa-solid fa-file-pdf"></i> <span className="hidden sm:inline">PDF Total</span>
                                            </button>
                                            <button onClick={() => handlePrintFinance('pending')} className="bg-orange-600 hover:bg-orange-700 text-white px-4 py-2 rounded-lg flex items-center gap-2 transition-colors shadow-sm text-sm font-medium">
                                                <i className="fa-solid fa-file-pdf"></i> <span className="hidden sm:inline">PDF Deudas</span>
                                            </button>
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                        <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-100">
                                            <h3 className="text-slate-500 font-medium mb-1">Total Facturado {financeClientFilter !== 'Todos' && `(${financeClientFilter})`}</h3>
                                            <p className={`text-4xl font-bold text-slate-800 ${showFinances ? '' : 'blur-md select-none transition-all'}`}>
                                                S/ {orders.filter(o => o.estado !== 'Cancelado').filter(isFinanceMatch).reduce((sum, o) => sum + o.costoTotal, 0).toFixed(2)}
                                            </p>
                                        </div>
                                        <div className="bg-orange-50 p-6 rounded-xl shadow-sm border border-orange-100">
                                            <h3 className="text-orange-800 font-medium mb-1">Total Pendiente {financeClientFilter !== 'Todos' && `(${financeClientFilter})`}</h3>
                                            <p className={`text-4xl font-bold text-orange-600 ${showFinances ? '' : 'blur-md select-none transition-all'}`}>
                                                S/ {orders.filter(o => o.estado === 'Pendiente').filter(isFinanceMatch).reduce((sum, o) => sum + (o.costoTotal - o.adelanto), 0).toFixed(2)}
                                            </p>
                                        </div>
                                    </div>
                                    <div className="bg-white rounded-xl shadow-sm border border-slate-100 overflow-hidden">
                                        <div className="p-4 bg-slate-50 border-b border-slate-100"><h3 className="font-bold text-slate-700">Desglose de Órdenes {financeClientFilter !== 'Todos' && `- ${financeClientFilter}`}</h3></div>
                                        <div className="overflow-x-auto">
                                            <table className="w-full text-left border-collapse min-w-[600px]">
                                                <thead>
                                                    <tr className="bg-white text-slate-500 text-sm border-b border-slate-100">
                                                        <th className="p-4 font-medium">Cliente</th><th className="p-4 font-medium">Actividad</th><th className="p-4 font-medium text-right">Costo Total</th>
                                                        <th className="p-4 font-medium text-right">Abonado</th><th className="p-4 font-medium text-right">Pendiente</th><th className="p-4 font-medium text-center">Estado</th>
                                                    </tr>
                                                </thead>
                                                <tbody>
                                                    {orders.filter(isFinanceMatch).map(o => {
                                                        const pendiente = o.costoTotal - o.adelanto;
                                                        return (
                                                            <tr key={o.id} className="border-b border-slate-50 hover:bg-slate-50 transition-colors">
                                                                <td className="p-4 text-sm text-slate-800 font-medium">{o.cliente}</td>
                                                                <td className="p-4 text-sm text-slate-600"><span className="font-medium text-slate-800 line-clamp-1">{o.servicio}</span>{o.empresa && <span className="text-xs text-indigo-500 mt-1 block"><i className="fa-solid fa-building"></i> {o.empresa}</span>}</td>
                                                                <td className={`p-4 text-sm text-right ${showFinances ? 'text-slate-600' : 'blur-sm select-none'}`}>S/ {o.costoTotal.toFixed(2)}</td>
                                                                <td className={`p-4 text-sm text-right ${showFinances ? 'text-emerald-600' : 'blur-sm select-none'}`}>S/ {o.adelanto.toFixed(2)}</td>
                                                                <td className={`p-4 text-sm text-right font-bold ${showFinances ? (pendiente > 0 ? 'text-orange-600' : 'text-slate-400') : 'blur-sm select-none'}`}>S/ {pendiente.toFixed(2)}</td>
                                                                <td className="p-4 text-center"><span className={`text-xs px-2 py-1 rounded-full ${o.estado === 'Pendiente' ? 'bg-orange-100 text-orange-700' : o.estado === 'Completado' ? 'bg-emerald-100 text-emerald-700' : 'bg-red-100 text-red-700'}`}>{o.estado}</span></td>
                                                            </tr>
                                                        );
                                                    })}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* FORMULARIO DE ÓRDENES */}
                            {!loadingData && view === 'form' && (
                                <div className="bg-white rounded-xl shadow-lg border border-slate-100 overflow-hidden max-w-4xl mx-auto">
                                    <div className="bg-slate-50 px-6 py-4 border-b border-slate-100 flex items-center justify-between">
                                        <div className="flex items-center gap-3">
                                            <button onClick={() => goTo('orders')} className="p-2 hover:bg-slate-200 rounded-full text-slate-500"><i className="fa-solid fa-arrow-left text-lg"></i></button>
