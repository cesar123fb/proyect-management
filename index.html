                                            <h2 className="text-xl font-bold text-slate-700">{editingId ? 'Editar Orden' : 'Nueva Orden'}</h2>
                                        </div>
                                        {editingId && (
                                            <select name="estado" value={formData.estado} onChange={handleChangeOrder} className="bg-white border border-slate-200 rounded-md py-1 px-3 text-sm font-bold text-slate-700 focus:outline-none focus:ring-2 focus:ring-indigo-500">
                                                <option value="Pendiente">🟡 Pendiente</option><option value="Completado">🟢 Completado</option><option value="Cancelado">🔴 Cancelado</option>
                                            </select>
                                        )}
                                    </div>
                                    <form onSubmit={handleSaveOrder} className="p-6">
                                        <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                                            <div className="space-y-6">
                                                <div className="space-y-4">
                                                    <h3 className="text-sm font-bold text-indigo-500 uppercase tracking-wider flex items-center gap-2"><i className="fa-solid fa-user"></i> Datos del Cliente</h3>
                                                    {clientsList.length === 0 ? (
                                                        <div className="bg-orange-50 text-orange-800 p-3 rounded-lg text-sm border border-orange-200 flex flex-col items-center">
                                                            <p className="mb-2 text-center">Para crear una orden, primero debes registrar un cliente.</p>
                                                            <button type="button" onClick={handleNewClient} className="bg-orange-500 text-white px-4 py-1.5 rounded-md hover:bg-orange-600 transition-colors text-xs font-bold">Ir a Nuevo Cliente</button>
                                                        </div>
                                                    ) : (
                                                        <>
                                                            <div>
                                                                <label className="block text-xs font-medium text-slate-500 mb-1">Seleccionar Cliente *</label>
                                                                <select name="cliente" required value={formData.cliente} onChange={handleChangeOrder} className="w-full p-2.5 rounded-lg border border-slate-200 focus:ring-2 focus:ring-indigo-500 bg-white">
                                                                    <option value="">Selecciona un cliente...</option>
                                                                    {clientsList.map(c => <option key={c.id} value={c.nombre}>{c.nombre}</option>)}
                                                                </select>
                                                            </div>
                                                            {clientCompanies.length > 0 && (
                                                                <div className="bg-indigo-50 p-3 rounded-lg border border-indigo-100">
                                                                    <label className="block text-xs font-bold text-indigo-700 mb-1"><i className="fa-solid fa-building"></i> Empresa (Opcional)</label>
                                                                    <select name="empresa" value={formData.empresa} onChange={handleChangeOrder} className="w-full p-2 rounded-md border border-indigo-200 focus:ring-2 focus:ring-indigo-500 bg-white text-sm">
                                                                        <option value="">Ninguna en específico</option>
                                                                        {clientCompanies.map((emp, i) => <option key={i} value={emp}>{emp}</option>)}
                                                                    </select>
                                                                </div>
                                                            )}
                                                            <div>
                                                                <label className="block text-xs font-medium text-slate-500 mb-1">Teléfono</label>
                                                                <input type="tel" name="telefono" className="w-full p-2.5 rounded-lg border border-slate-200 bg-slate-50" value={formData.telefono} readOnly placeholder="Autocompletado al seleccionar cliente..." />
                                                            </div>
                                                        </>
                                                    )}
                                                </div>
                                                <div className="space-y-4 pt-4 border-t border-slate-100">
                                                    <h3 className="text-sm font-bold text-indigo-500 uppercase tracking-wider flex items-center gap-2"><i className="fa-solid fa-file-lines"></i> Servicio</h3>
                                                    <div className="grid grid-cols-2 gap-4">
                                                        <div>
                                                            <label className="block text-xs font-medium text-slate-500 mb-1">Tipo de Servicio *</label>
                                                            <select name="tipoServicio" required value={formData.tipoServicio || 'Diseños'} onChange={handleChangeOrder} className="w-full p-2.5 rounded-lg border border-slate-200 focus:ring-2 focus:ring-indigo-500 bg-white">
                                                                <option value="Logística">Logística</option>
                                                                <option value="Reingeniería">Reingeniería</option>
                                                                <option value="Diseños">Diseños</option>
                                                                <option value="Visitas Técnicas">Visitas Técnicas</option>
                                                                <option value="Delivery">Delivery</option>
                                                                <option value="Calidad">Calidad</option>
                                                            </select>
                                                        </div>
                                                        <div>
                                                            <label className="block text-xs font-medium text-slate-500 mb-1">Fecha de Solicitud *</label>
                                                            <input type="date" name="fechaSolicitud" required value={formData.fechaSolicitud || ''} onChange={handleChangeOrder} className="w-full p-2.5 rounded-lg border border-slate-200 focus:ring-2 focus:ring-indigo-500 bg-white" />
                                                        </div>
                                                    </div>
                                                    <div>
                                                        <label className="block text-xs font-medium text-slate-500 mb-1">Actividad *</label>
                                                        <textarea name="servicio" required rows="2" className="w-full p-2.5 rounded-lg border border-slate-200 focus:ring-2 focus:ring-indigo-500" value={formData.servicio} onChange={handleChangeOrder}></textarea>
                                                    </div>
                                                    <div>
                                                        <label className="block text-xs font-medium text-slate-500 mb-1">Extras / Detalles</label>
                                                        <textarea name="extras" rows="2" className="w-full p-2.5 rounded-lg border border-slate-200 focus:ring-2 focus:ring-indigo-500" value={formData.extras} onChange={handleChangeOrder}></textarea>
                                                    </div>
                                                </div>
                                            </div>

                                            <div className="space-y-6">
                                                <div className="space-y-4">
                                                    <h3 className="text-sm font-bold text-indigo-500 uppercase tracking-wider flex items-center gap-2"><i className="fa-solid fa-dollar-sign"></i> Finanzas</h3>
                                                    <div>
                                                        <label className="block text-xs font-medium text-slate-500 mb-1">Costo Total del Proyecto *</label>
                                                        <div className="relative">
                                                            <span className="absolute left-3 top-2.5 text-slate-400 font-bold">S/</span>
                                                            <input type="number" name="costoTotal" required min="0" step="0.01" className="w-full pl-8 pr-2.5 py-2.5 rounded-lg border border-slate-200 focus:ring-2 focus:ring-indigo-500 font-bold text-slate-700" value={formData.costoTotal} onChange={handleChangeOrder} />
                                                        </div>
                                                    </div>
                                                    <div className="bg-slate-50 p-4 rounded-xl border border-slate-200 space-y-3 mt-4">
                                                        <div className="flex justify-between items-center">
                                                            <label className="block text-xs font-bold text-slate-600 uppercase tracking-wider flex items-center gap-1"><i className="fa-solid fa-credit-card text-sm"></i> Pagos / Adelantos</label>
                                                            <button type="button" onClick={handleAddDeposito} className="text-xs bg-indigo-100 text-indigo-700 px-3 py-1.5 rounded-md hover:bg-indigo-200 flex items-center gap-1 font-bold transition-colors">
                                                                <i className="fa-solid fa-plus text-sm"></i> Añadir
                                                            </button>
                                                        </div>
                                                        <div className="space-y-2 max-h-40 overflow-y-auto pr-1">
                                                            {formData.depositos?.map((dep, idx) => (
                                                                <div key={idx} className="flex gap-2 items-center bg-white p-2 rounded-lg border border-slate-200 shadow-sm">
                                                                    <div className="relative flex-1">
                                                                        <span className="absolute left-3 top-1.5 text-slate-400 font-bold">S/</span>
                                                                        <input type="number" value={dep.monto} onChange={e => handleDepositoChange(idx, 'monto', e.target.value)} placeholder="Monto" className="w-full pl-8 pr-3 py-1.5 text-sm rounded-md border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none" />
                                                                    </div>
                                                                    <input type="date" value={dep.fecha} onChange={e => handleDepositoChange(idx, 'fecha', e.target.value)} className="flex-1 px-3 py-1.5 text-sm rounded-md border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none" />
                                                                    <button type="button" onClick={() => handleRemoveDeposito(idx)} className="text-red-400 p-1.5 hover:bg-red-50 hover:text-red-600 rounded-md transition-colors"><i className="fa-solid fa-trash"></i></button>
                                                                </div>
                                                            ))}
                                                            {(!formData.depositos || formData.depositos.length === 0) && (<p className="text-xs text-slate-400 italic text-center py-4 bg-white border border-dashed border-slate-200 rounded-lg">Aún no se han registrado pagos.</p>)}
                                                        </div>
                                                        <div className="flex justify-between items-center pt-2 border-t border-slate-200">
                                                            <span className="text-xs font-medium text-slate-500">Total Abonado:</span><span className="text-sm font-bold text-emerald-600">S/ {formTotalAdelanto.toFixed(2)}</span>
                                                        </div>
                                                    </div>
                                                    <div className="bg-slate-800 text-white p-4 rounded-lg mt-2 flex justify-between items-center shadow-inner">
                                                        <span className="text-sm font-medium opacity-80">Saldo Pendiente:</span>
                                                        <span className="text-2xl font-bold">S/ {((parseFloat(formData.costoTotal) || 0) - formTotalAdelanto).toFixed(2)}</span>
                                                    </div>
                                                </div>
                                                <div className="space-y-4 pt-4 border-t border-slate-100">
                                                    <h3 className="text-sm font-bold text-indigo-500 uppercase tracking-wider flex items-center gap-2"><i className="fa-solid fa-image"></i> Imágenes</h3>
                                                    <label className="border-2 border-dashed border-slate-300 rounded-lg p-6 flex flex-col items-center justify-center text-slate-500 hover:bg-slate-50 hover:border-indigo-400 transition-colors cursor-pointer">
                                                        <i className="fa-solid fa-image text-2xl mb-2"></i><span className="text-sm font-medium">Haz clic para subir imágenes</span>
                                                        <input type="file" multiple accept="image/*" className="hidden" onChange={handleImageUpload} />
                                                    </label>
                                                    {formData.imagenes && formData.imagenes.length > 0 && (
                                                        <div className="grid grid-cols-3 gap-2 mt-4">
                                                            {formData.imagenes.map((img, idx) => (
                                                                <div key={idx} className="relative group rounded-md overflow-hidden border border-slate-200 aspect-square">
                                                                    <img src={img} alt={`Ref ${idx}`} className="w-full h-full object-cover" />
                                                                    <button type="button" onClick={() => removeImage(idx)} className="absolute top-1 right-1 bg-red-500 text-white rounded-full p-1 opacity-0 group-hover:opacity-100 transition-opacity"><i className="fa-solid fa-xmark text-xs"></i></button>
                                                                </div>
                                                            ))}
                                                        </div>
                                                    )}
                                                </div>
                                            </div>
                                        </div>
                                        <div className="pt-6 mt-8 border-t border-slate-100 flex justify-end gap-3">
                                            <button type="button" onClick={() => goTo('orders')} className="px-6 py-2.5 rounded-lg border border-slate-200 text-slate-600 font-medium hover:bg-slate-50">Cancelar</button>
                                            <button type="submit" disabled={isSaving || clientsList.length === 0} className={`px-6 py-2.5 rounded-lg text-white font-medium flex items-center gap-2 ${(isSaving || clientsList.length === 0) ? 'bg-slate-400 cursor-not-allowed' : 'bg-indigo-600 hover:bg-indigo-700'}`}>
                                                <i className={`fa-solid ${isSaving ? 'fa-spinner fa-spin' : 'fa-floppy-disk'} text-lg`}></i> {isSaving ? 'Guardando...' : 'Guardar Orden'}
                                            </button>
                                        </div>
                                    </form>
                                </div>
                            )}

                            {/* CALENDARIO */}
                            {!loadingData && view === 'calendar' && (
                                <div className="space-y-6">
                                    <div className="flex flex-col sm:flex-row justify-between items-center gap-4 bg-white p-4 rounded-xl shadow-sm border border-slate-100">
                                        <h2 className="text-xl font-bold text-slate-700 flex items-center gap-2"><i className="fa-solid fa-calendar-days text-indigo-500"></i> Calendario de Actividades</h2>
                                        <div className="flex items-center gap-4">
                                            <button onClick={prevMonth} className="p-2 bg-slate-100 text-slate-600 rounded-lg hover:bg-slate-200"><i className="fa-solid fa-chevron-left"></i></button>
                                            <span className="font-bold text-slate-800 capitalize w-40 text-center">
                                                {calendarDate.toLocaleDateString('es-ES', { month: 'long', year: 'numeric' })}
                                            </span>
                                            <button onClick={nextMonth} className="p-2 bg-slate-100 text-slate-600 rounded-lg hover:bg-slate-200"><i className="fa-solid fa-chevron-right"></i></button>
                                        </div>
                                    </div>

                                    <div className="bg-white rounded-xl shadow-sm border border-slate-100 p-4">
                                        <div className="grid grid-cols-7 gap-2 mb-2 text-center font-bold text-sm text-slate-500">
                                            <div>Dom</div><div>Lun</div><div>Mar</div><div>Mié</div><div>Jue</div><div>Vie</div><div>Sáb</div>
                                        </div>
                                        <div className="grid grid-cols-7 gap-2">
                                            {Array.from({ length: firstDayOfMonth }).map((_, i) => (
                                                <div key={`empty-${i}`} className="h-32 bg-slate-50 rounded-lg border border-dashed border-slate-200 opacity-50"></div>
                                            ))}
                                            {calendarDays.map(({ day, dateStr, dayOrders, dayActivities }) => (
                                                <div key={day} onClick={() => openActivityModal(dateStr)} className="h-32 overflow-y-auto bg-white rounded-lg border border-slate-200 p-2 relative group hover:border-emerald-300 hover:shadow-md cursor-pointer transition-all">
                                                    <div className="flex justify-between items-start mb-1">
                                                        <span className={`text-xs font-bold rounded-full w-6 h-6 flex items-center justify-center ${dateStr === new Date().toISOString().split('T')[0] ? 'bg-indigo-600 text-white' : 'text-slate-500'}`}>{day}</span>
                                                        <i className="fa-solid fa-plus text-emerald-400 opacity-0 group-hover:opacity-100 transition-opacity text-xs"></i>
                                                    </div>
                                                    <div className="space-y-1">
                                                        {/* Renderizamos las actividades personalizadas (Verdes) */}
                                                        {dayActivities.map(a => (
                                                            <div key={a.id} onClick={(e) => requestDelete(e, 'activity', a.id)} className="bg-emerald-50 border border-emerald-200 text-emerald-800 text-[10px] leading-tight p-1.5 rounded font-medium truncate hover:bg-red-100 hover:text-red-800 hover:border-red-300 transition-colors" title={`Actividad: ${a.descripcion}`}>
                                                                <span className="font-bold mr-1">{a.horas ? `${a.horas}h` : ''}</span>
                                                                {a.descripcion}
                                                            </div>
                                                        ))}
                                                        {/* Renderizamos las órdenes creadas en este día (Azules) */}
                                                        {dayOrders.map(o => (
                                                            <div key={o.id} onClick={(e) => { e.stopPropagation(); handleEditOrder(o); }} className="bg-indigo-50 border border-indigo-200 text-indigo-800 text-[10px] leading-tight p-1.5 rounded font-medium truncate hover:bg-indigo-100 transition-colors" title={`Orden de ${o.cliente}: ${o.servicio}`}>
                                                                <i className="fa-solid fa-box mr-1 opacity-70"></i>{o.cliente}
                                                            </div>
                                                        ))}
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* INGRESOS MENSUALES */}
                            {!loadingData && view === 'income' && (
                                <div className="space-y-6">
                                    <div className="flex flex-col sm:flex-row justify-between items-center gap-4 bg-white p-4 rounded-xl shadow-sm border border-slate-100">
                                        <h2 className="text-xl font-bold text-slate-700 flex items-center gap-2"><i className="fa-solid fa-money-bill-wave text-emerald-500"></i> Control de Ingresos</h2>
                                        <div className="flex items-center gap-2">
                                            <label className="text-sm font-medium text-slate-500">Mes a consultar:</label>
                                            <input type="month" value={incomeMonth} onChange={(e) => setIncomeMonth(e.target.value)} className="p-2 rounded-lg border border-slate-200 focus:ring-2 focus:ring-emerald-500 outline-none text-sm font-bold text-slate-700" />
                                        </div>
                                    </div>

                                    <div className="bg-gradient-to-r from-emerald-500 to-teal-500 rounded-xl shadow-md p-8 text-white text-center">
                                        <h3 className="text-emerald-100 font-medium mb-2 text-lg">Total Recibido este mes</h3>
                                        <p className="text-5xl font-bold">S/ {depositsData.monthlyTotal.toFixed(2)}</p>
                                    </div>

                                    <div className="bg-white rounded-xl shadow-sm border border-slate-100 overflow-hidden">
                                        <div className="p-4 bg-slate-50 border-b border-slate-100 flex justify-between items-center">
                                            <h3 className="font-bold text-slate-700">Historial de Depósitos / Adelantos</h3>
                                            <span className="bg-slate-200 text-slate-600 text-xs px-2 py-1 rounded-full font-bold">{depositsData.all.filter(d=>d.isCurrentMonth).length} registros en el mes</span>
                                        </div>
                                        <div className="overflow-x-auto">
                                            <table className="w-full text-left border-collapse min-w-[600px]">
                                                <thead>
                                                    <tr className="bg-white text-slate-500 text-sm border-b border-slate-100">
                                                        <th className="p-4 font-medium">Fecha</th>
                                                        <th className="p-4 font-medium">Monto</th>
                                                        <th className="p-4 font-medium">Cliente</th>
                                                        <th className="p-4 font-medium">Actividad</th>
                                                        <th className="p-4 font-medium">ID Orden</th>
                                                    </tr>
                                                </thead>
                                                <tbody>
                                                    {depositsData.all.length === 0 ? (
                                                        <tr><td colSpan="5" className="p-8 text-center text-slate-500 italic">No hay depósitos registrados.</td></tr>
                                                    ) : (
                                                        depositsData.all.map((dep, idx) => (
                                                            <tr key={idx} className={`border-b border-slate-50 transition-colors ${dep.isCurrentMonth ? 'bg-emerald-50/50 hover:bg-emerald-50' : 'opacity-50 hover:opacity-100'}`}>
                                                                <td className="p-4 text-sm text-slate-600"><i className="fa-solid fa-calendar-day text-slate-400 mr-2"></i>{dep.fecha}</td>
                                                                <td className="p-4 text-sm font-bold text-emerald-600">S/ {parseFloat(dep.monto).toFixed(2)}</td>
                                                                <td className="p-4 text-sm text-slate-800 font-medium">{dep.cliente}</td>
                                                                <td className="p-4 text-sm text-slate-600 truncate max-w-[200px]">{dep.actividad}</td>
                                                                <td className="p-4 text-xs font-mono text-slate-400">{dep.ordenId}</td>
                                                            </tr>
                                                        ))
                                                    )}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                </div>
                            )}
                        </main>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
